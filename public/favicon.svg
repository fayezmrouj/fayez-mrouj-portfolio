<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941F"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Gold accent dot (orbit) -->
  <circle cx="48" cy="16" r="3.5" fill="url(#gold)"/>
  <!-- Atom orbit ring (subtle) -->
  <ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.25" transform="rotate(-25 32 32)"/>
  <!-- Letter F -->
  <text x="32" y="44" font-family="Manrope, Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#FFFFFF" text-anchor="middle">F</text>
</svg>
